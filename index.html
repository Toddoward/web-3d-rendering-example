<!DOCTYPE html>
<html>
<head>
<title>PrismQ</title>
<style>*{margin:0;padding:0}body{overflow:hidden}canvas{display:block}</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 5;
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

// ── 배경색 설정 ──
const BG_COLOR = '#5866A5';
renderer.setClearColor(new THREE.Color(BG_COLOR), 1.0);
document.body.style.background = BG_COLOR;
document.body.appendChild(renderer.domElement);

// ── 4광원 구면좌표 ──
const PI = Math.PI;
function sph(r,t,p){ return new THREE.Vector3(r*Math.sin(t)*Math.cos(p), r*Math.cos(t), r*Math.sin(t)*Math.sin(p)); }
const LR = 13.0;
const lPos = [
  sph(LR, PI*0.22, PI*0.28),
  sph(LR, PI*0.68, PI*1.25),
  sph(LR, PI*0.50, PI*0.04),
  sph(LR, PI*0.88, PI*1.82),
];
const lCol = [
  new THREE.Vector3(1.00, 1.00, 1.00),  // 순백 (주 하이라이트, 분산의 베이스)
  new THREE.Vector3(0.75, 0.88, 1.00),  // 쿨 화이트 (은청 톤, 그림자 영역 틴트)
  new THREE.Vector3(1.00, 0.95, 0.82),  // 웜 화이트 (아이보리, 반대편 하이라이트)
  new THREE.Vector3(0.65, 0.78, 0.88),  // 소프트 스틸 블루 (전체 앰비언트 틴트)
];

const uTime        = { value: 0.0 };
const uMatWorldInv = { value: new THREE.Matrix4() };
const uModelMat    = { value: new THREE.Matrix4() };
const uNormalMat   = { value: new THREE.Matrix3() };

const mat = new THREE.ShaderMaterial({
  transparent: true,
  blending: THREE.CustomBlending,
  blendSrc: THREE.OneFactor,
  blendDst: THREE.OneMinusSrcAlphaFactor,
  depthWrite: false,
  side: THREE.FrontSide,
  uniforms: {
    uTime:        uTime,
    uMatWorldInv: uMatWorldInv,
    uModelMat:    uModelMat,
    uNormalMat:   uNormalMat,
    uCamPos:      { value: camera.position },
    uTransp:      { value: 0.25 },   // 0=Fresnel 투명, 1=완전불투명
    uRoughness:   { value: 0.5 },   // 0=거울유리, 1=서리유리
    uLPos1: { value: lPos[0] }, uLPos2: { value: lPos[1] },
    uLPos3: { value: lPos[2] }, uLPos4: { value: lPos[3] },
    uLCol1: { value: lCol[0] }, uLCol2: { value: lCol[1] },
    uLCol3: { value: lCol[2] }, uLCol4: { value: lCol[3] },
  },

  vertexShader: `
    uniform mat4 uMatWorldInv;
    varying vec3 vObjPos;
    varying vec3 vCamObjPos;
    void main() {
      vObjPos    = position;
      vCamObjPos = (uMatWorldInv * vec4(cameraPosition, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,

  fragmentShader: `
    #define PI 3.14159265359
    uniform float uTime;
    uniform mat4  uModelMat;
    uniform mat3  uNormalMat;
    uniform vec3  uCamPos;
    uniform float uTransp;
    uniform float uRoughness;
    uniform vec3  uLPos1, uLPos2, uLPos3, uLPos4;
    uniform vec3  uLCol1, uLCol2, uLCol3, uLCol4;
    varying vec3  vObjPos;
    varying vec3  vCamObjPos;

    // ── 3D Simplex Noise ──
    vec3 _mod289v3(vec3 x){return x-floor(x*(1./289.))*289.;}
    vec4 _mod289v4(vec4 x){return x-floor(x*(1./289.))*289.;}
    vec4 _permute(vec4 x){return _mod289v4(((x*34.)+1.)*x);}
    vec4 _taylorInvSqrt(vec4 r){return 1.79284291400159-.85373472095314*r;}
    float _vn(vec3 v){
      const vec2 C=vec2(1./6.,1./3.);
      const vec4 D=vec4(0.,.5,1.,2.);
      vec3 i=floor(v+dot(v,C.yyy));
      vec3 x0=v-i+dot(i,C.xxx);
      vec3 g=step(x0.yzx,x0.xyz);
      vec3 l=1.-g;
      vec3 i1=min(g.xyz,l.zxy);
      vec3 i2=max(g.xyz,l.zxy);
      vec3 x1=x0-i1+C.xxx;
      vec3 x2=x0-i2+C.yyy;
      vec3 x3=x0-D.yyy;
      i=_mod289v3(i);
      vec4 p=_permute(_permute(_permute(
        i.z+vec4(0.,i1.z,i2.z,1.))
        +i.y+vec4(0.,i1.y,i2.y,1.))
        +i.x+vec4(0.,i1.x,i2.x,1.));
      float n_=.142857142857;
      vec3 ns=n_*D.wyz-D.xzx;
      vec4 j=p-49.*floor(p*ns.z*ns.z);
      vec4 x_=floor(j*ns.z);
      vec4 y_=floor(j-7.*x_);
      vec4 x=x_*ns.x+ns.yyyy;
      vec4 y=y_*ns.x+ns.yyyy;
      vec4 h=1.-abs(x)-abs(y);
      vec4 b0=vec4(x.xy,y.xy);
      vec4 b1=vec4(x.zw,y.zw);
      vec4 s0=floor(b0)*2.+1.;
      vec4 s1=floor(b1)*2.+1.;
      vec4 sh=-step(h,vec4(0.));
      vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
      vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
      vec3 p0=vec3(a0.xy,h.x);
      vec3 p1=vec3(a0.zw,h.y);
      vec3 p2=vec3(a1.xy,h.z);
      vec3 p3=vec3(a1.zw,h.w);
      vec4 norm=_taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
      p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
      vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
      m=m*m;
      return .5+.5*(42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3))));
    }

    // ── SDF ──
    // Exact rounded octahedron SDF (Inigo Quilez)
    float _octa(vec3 p, float s){
      p = abs(p);
      float m = p.x+p.y+p.z-s;
      vec3 q;
      if(3.0*p.x < m) q = p.xyz;
      else if(3.0*p.y < m) q = p.yzx;
      else if(3.0*p.z < m) q = p.zxy;
      else return m*0.57735027;
      float k = clamp(0.5*(q.z-q.y+s), 0.0, s);
      return length(vec3(q.x, q.y-s+k, q.z-k));
    }
    float _smin(float a,float b,float k){ float h=clamp(.5+.5*(b-a)/k,0.,1.); return mix(b,a,h)-k*h*(1.-h); }
    mat3 rotY(float a){ float c=cos(a),s=sin(a); return mat3(c,0,s, 0,1,0, -s,0,c); }
    mat3 rotX(float a){ float c=cos(a),s=sin(a); return mat3(1,0,0, 0,c,-s, 0,s,c); }

    float _scene(vec3 p){
      // 정팔면체
      vec3 po = rotX(uTime*0.18) * rotY(uTime*0.32) * p;
      float octa = _octa(po, 1.0) - 0.03;

      // 액체 느낌
      vec3 pb = rotX(-uTime*0.18) * rotY(-uTime*0.32) * p;
      float t    = uTime * 0.18;
      vec3  q    = pb * 2.5 + t;
      vec3  w    = q + 0.1*vec3(_vn(q), _vn(q+vec3(5.2,1.3,0.)), _vn(q+vec3(1.7,9.2,0.)));
      float blob = length(pb) - 0.72 - (_vn(w)-0.75)*0.25;
      return _smin(octa, blob, 0.1);
    }

    vec3 _normal(vec3 p){
      const float e=0.004;
      return normalize(vec3(
        _scene(p+vec3(e,0,0))-_scene(p-vec3(e,0,0)),
        _scene(p+vec3(0,e,0))-_scene(p-vec3(0,e,0)),
        _scene(p+vec3(0,0,e))-_scene(p-vec3(0,0,e))));
    }

    float _rm(vec3 ro, vec3 rd){
      float d=0.;
      for(int i=0;i<120;i++){
        float s=_scene(ro+rd*d);
        if(s<0.001||d>8.) break;
        d+=s*0.85;
      }
      return d;
    }

    // ── 환경 반사 (roughness 기반 lobe) ──
    vec3 envColor(vec3 dir, float rough){
      float e1=mix(48.,3.,rough*rough), e2=mix(28.,3.,rough*rough);
      float e3=mix(52.,3.,rough*rough), e4=mix(22.,3.,rough*rough);
      vec3 c=vec3(0.);
      c+=uLCol1*pow(max(dot(dir,normalize(uLPos1)),0.),e1)*5.0;
      c+=uLCol2*pow(max(dot(dir,normalize(uLPos2)),0.),e2)*3.5;
      c+=uLCol3*pow(max(dot(dir,normalize(uLPos3)),0.),e3)*5.0;
      c+=uLCol4*pow(max(dot(dir,normalize(uLPos4)),0.),e4)*2.5;
      c+=mix(vec3(0.01,0.01,0.03),vec3(0.04,0.05,0.09),dir.y*0.5+0.5)*0.5;
      return c;
    }

    // ── GGX NDF ──
    float D_GGX(float NdotH, float rough){
      float a2=rough*rough*rough*rough;
      float d=NdotH*NdotH*(a2-1.)+1.;
      return a2/(PI*d*d+0.0001);
    }
    // ── Smith-Schlick Geometry ──
    float G_Smith(float NdotV2, float NdotL, float rough){
      float k=(rough+1.)*(rough+1.)/8.;
      float gv=NdotV2/(NdotV2*(1.-k)+k);
      float gl=NdotL/(NdotL*(1.-k)+k);
      return gv*gl;
    }
    // ── Dan Bruton 파장→RGB (380~700nm) ──
    vec3 wl2rgb(float w){
      vec3 c;
      if     (w<440.) c=vec3(-(w-440.)/(440.-380.),0.,1.);
      else if(w<490.) c=vec3(0.,(w-440.)/(490.-440.),1.);
      else if(w<510.) c=vec3(0.,1.,-(w-510.)/(510.-490.));
      else if(w<580.) c=vec3((w-510.)/(580.-510.),1.,0.);
      else if(w<645.) c=vec3(1.,-(w-645.)/(645.-580.),0.);
      else            c=vec3(1.,0.,0.);
      return clamp(c,0.,1.);
    }

    float fresnel(vec3 V, vec3 N, float ior){
      float r0=pow((1.-ior)/(1.+ior),2.);
      return r0+(1.-r0)*pow(1.-clamp(dot(V,N),0.,1.),5.);
    }

    vec3 tonemapGamma(vec3 c){
      c=c/(c+1.);
      return pow(c,vec3(1./2.2));
    }

    void main(){
      vec3 ro = vCamObjPos;
      vec3 rd = normalize(vObjPos - vCamObjPos);

      float d   = _rm(ro, rd);
      bool  hit = d < 8.0;
      if(!hit){ discard; return; }

      // 오브젝트 공간 히트포인트 + 노말
      vec3 p    = ro + rd * d;
      vec3 objN = _normal(p);

      // 월드 공간으로 변환
      vec3 wPos = (uModelMat * vec4(p, 1.0)).xyz;
      vec3 N    = normalize(uNormalMat * objN);
      vec3 V    = normalize(uCamPos - wPos);
      float NdotV = clamp(dot(N, V), 0., 1.);

      vec3 albedo = vec3(0.88, 0.91, 0.95);
      float rough = uRoughness;
      float F0    = pow((1.-1.45)/(1.+1.45),2.);  // ~0.035

      // ── 환경 반사 (roughness 기반) ──
      vec3 refl     = envColor(reflect(-V, N), rough) * 2.2 * albedo;
      float fres    = fresnel(V, N, 1.45);
      vec3  coloredRefl;
      {
        float filmVar  = NdotV + (_vn((ro+rd*d)*4.5+uTime*0.18)-0.5)*0.35;
        vec3  thinFilm = 0.5+0.5*cos(filmVar*PI*1.8+vec3(0.,2.094,4.189));
        coloredRefl    = refl * mix(vec3(1.0), thinFilm*1.6, 0.75);
      }
      vec3 base = coloredRefl * mix(0.5, 1.0, fres);

      // ── GGX Cook-Torrance 스펙큘러 4광원 ──
      vec3 spec = vec3(0.);
      vec3 lightDirs[4];
      vec3 lightCols[4];
      lightDirs[0]=normalize(uLPos1-wPos); lightCols[0]=uLCol1;
      lightDirs[1]=normalize(uLPos2-wPos); lightCols[1]=uLCol2;
      lightDirs[2]=normalize(uLPos3-wPos); lightCols[2]=uLCol3;
      lightDirs[3]=normalize(uLPos4-wPos); lightCols[3]=uLCol4;
      for(int i=0;i<4;i++){
        vec3  L     = lightDirs[i];
        vec3  H     = normalize(L+V);
        float NdotL = max(dot(N,L),0.);
        float NdotH = max(dot(N,H),0.);
        float VdotH = max(dot(V,H),0.);
        float D     = D_GGX(NdotH, rough);
        float G     = G_Smith(NdotV, NdotL, rough);
        vec3  F     = vec3(F0)+(1.-F0)*pow(1.-VdotH,5.);
        spec       += lightCols[i] * (D*G*F/(4.*NdotV*NdotL+0.001)) * NdotL * 2.5;
      }

      // ── 스펙트럼 분산 (Dan Bruton 8파장 샘플) ──
      vec3 prism = vec3(0.);
      vec3 Ld1=lightDirs[0], Ld3=lightDirs[2];
      for(int i=0;i<8;i++){
        float wl  = mix(400.,700.,float(i)/7.);
        float ior = 1.45 + 0.0035/(wl*wl*0.000001);
        float sh  = mix(800., 200., rough);
        float s1  = pow(max(dot(N,normalize(Ld1*ior+V)),0.),sh);
        float s3  = pow(max(dot(N,normalize(Ld3*ior+V)),0.),sh);
        prism    += wl2rgb(wl) * (s1+s3);
      }
      prism /= 8.0;

      // ── 림 + 이리데슨스 엣지 ──
      vec3 rim      = pow(1.-NdotV,3.2)*vec3(0.70,0.90,1.00)*0.8;
      float iridM   = pow(1.-NdotV,3.8);
      vec3  irid    = (0.5+0.5*cos((1.-NdotV)*PI*6.5+vec3(0.,2.094,4.189)))*iridM*0.7;

      // ── Alpha: FresnelSchlickRoughness ──
      float NdotV_a  = clamp(-dot(rd,objN),0.,1.);
      float maxFr    = max(1.-rough, F0);
      float fresnelR = F0+(maxFr-F0)*pow(1.-NdotV_a,5.);
      float alpha    = mix(mix(fresnelR,1.,rough), 1., uTransp);

      // ── Premultiplied alpha 출력 ──
      vec3 diffCol = tonemapGamma(base + irid + rim);
      vec3 specCol = tonemapGamma(spec + prism*3.0);
      gl_FragColor = vec4(diffCol*alpha + specCol, alpha);
    }
  `,
});

const mesh = new THREE.Mesh(new THREE.BoxGeometry(2.8,2.8,2.8), mat);
mesh.frustumCulled = false;
scene.add(mesh);

let t=0;
(function animate(){
  requestAnimationFrame(animate);
  t+=0.016;
  mesh.updateMatrixWorld();
  uMatWorldInv.value.copy(mesh.matrixWorld).invert();
  uModelMat.value.copy(mesh.matrixWorld);
  uNormalMat.value.getNormalMatrix(mesh.matrixWorld);
  uTime.value = t;
  renderer.render(scene, camera);
})();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
