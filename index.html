<!DOCTYPE html>
<html>
<head>
<title>PrismQ</title>
<style>*{margin:0;padding:0}body{overflow:hidden}canvas{display:block}</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 5;
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

// ── 배경색 설정 ──
const BG_COLOR = '#5866A5';
renderer.setClearColor(new THREE.Color(BG_COLOR), 1.0);
document.body.style.background = BG_COLOR;
document.body.appendChild(renderer.domElement);

// ── 4광원 구면좌표 ──
const PI = Math.PI;
function sph(r,t,p){ return new THREE.Vector3(r*Math.sin(t)*Math.cos(p), r*Math.cos(t), r*Math.sin(t)*Math.sin(p)); }
const LR = 13.0;
const lPos = [
  sph(LR, PI*0.22, PI*0.28),
  sph(LR, PI*0.68, PI*1.25),
  sph(LR, PI*0.50, PI*0.04),
  sph(LR, PI*0.88, PI*1.82),
];
const lCol = [
  new THREE.Vector3(0.87, 0.95, 0.90),
  new THREE.Vector3(1.00, 0.10, 0.05),
  new THREE.Vector3(0.10, 1.00, 0.05),
  new THREE.Vector3(0.10, 0.05, 1.00),
];

const uTime        = { value: 0.0 };
const uMatWorldInv = { value: new THREE.Matrix4() };
const uModelMat    = { value: new THREE.Matrix4() };
const uNormalMat   = { value: new THREE.Matrix3() };

const mat = new THREE.ShaderMaterial({
  transparent: true,
  blending: THREE.CustomBlending,
  blendSrc: THREE.OneFactor,
  blendDst: THREE.OneMinusSrcAlphaFactor,
  depthWrite: false,
  side: THREE.FrontSide,
  uniforms: {
    uTime:        uTime,
    uMatWorldInv: uMatWorldInv,
    uModelMat:    uModelMat,
    uNormalMat:   uNormalMat,
    uCamPos:      { value: camera.position },
    uTransp:      { value: 0.5 },
    uLPos1: { value: lPos[0] }, uLPos2: { value: lPos[1] },
    uLPos3: { value: lPos[2] }, uLPos4: { value: lPos[3] },
    uLCol1: { value: lCol[0] }, uLCol2: { value: lCol[1] },
    uLCol3: { value: lCol[2] }, uLCol4: { value: lCol[3] },
  },

  vertexShader: `
    uniform mat4 uMatWorldInv;
    varying vec3 vObjPos;
    varying vec3 vCamObjPos;
    void main() {
      vObjPos    = position;
      vCamObjPos = (uMatWorldInv * vec4(cameraPosition, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,

  fragmentShader: `
    #define PI 3.14159265359
    uniform float uTime;
    uniform mat4  uModelMat;
    uniform mat3  uNormalMat;
    uniform vec3  uCamPos;
    uniform float uTransp;
    uniform vec3  uLPos1, uLPos2, uLPos3, uLPos4;
    uniform vec3  uLCol1, uLCol2, uLCol3, uLCol4;
    varying vec3  vObjPos;
    varying vec3  vCamObjPos;

    // ── 3D Simplex Noise ──
    vec3 _mod289v3(vec3 x){return x-floor(x*(1./289.))*289.;}
    vec4 _mod289v4(vec4 x){return x-floor(x*(1./289.))*289.;}
    vec4 _permute(vec4 x){return _mod289v4(((x*34.)+1.)*x);}
    vec4 _taylorInvSqrt(vec4 r){return 1.79284291400159-.85373472095314*r;}
    float _vn(vec3 v){
      const vec2 C=vec2(1./6.,1./3.);
      const vec4 D=vec4(0.,.5,1.,2.);
      vec3 i=floor(v+dot(v,C.yyy));
      vec3 x0=v-i+dot(i,C.xxx);
      vec3 g=step(x0.yzx,x0.xyz);
      vec3 l=1.-g;
      vec3 i1=min(g.xyz,l.zxy);
      vec3 i2=max(g.xyz,l.zxy);
      vec3 x1=x0-i1+C.xxx;
      vec3 x2=x0-i2+C.yyy;
      vec3 x3=x0-D.yyy;
      i=_mod289v3(i);
      vec4 p=_permute(_permute(_permute(
        i.z+vec4(0.,i1.z,i2.z,1.))
        +i.y+vec4(0.,i1.y,i2.y,1.))
        +i.x+vec4(0.,i1.x,i2.x,1.));
      float n_=.142857142857;
      vec3 ns=n_*D.wyz-D.xzx;
      vec4 j=p-49.*floor(p*ns.z*ns.z);
      vec4 x_=floor(j*ns.z);
      vec4 y_=floor(j-7.*x_);
      vec4 x=x_*ns.x+ns.yyyy;
      vec4 y=y_*ns.x+ns.yyyy;
      vec4 h=1.-abs(x)-abs(y);
      vec4 b0=vec4(x.xy,y.xy);
      vec4 b1=vec4(x.zw,y.zw);
      vec4 s0=floor(b0)*2.+1.;
      vec4 s1=floor(b1)*2.+1.;
      vec4 sh=-step(h,vec4(0.));
      vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
      vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
      vec3 p0=vec3(a0.xy,h.x);
      vec3 p1=vec3(a0.zw,h.y);
      vec3 p2=vec3(a1.xy,h.z);
      vec3 p3=vec3(a1.zw,h.w);
      vec4 norm=_taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
      p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
      vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
      m=m*m;
      return .5+.5*(42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3))));
    }

    // ── SDF ──
    // Exact rounded octahedron SDF (Inigo Quilez)
    float _octa(vec3 p, float s){
      p = abs(p);
      float m = p.x+p.y+p.z-s;
      vec3 q;
      if(3.0*p.x < m) q = p.xyz;
      else if(3.0*p.y < m) q = p.yzx;
      else if(3.0*p.z < m) q = p.zxy;
      else return m*0.57735027;
      float k = clamp(0.5*(q.z-q.y+s), 0.0, s);
      return length(vec3(q.x, q.y-s+k, q.z-k));
    }
    float _smin(float a,float b,float k){ float h=clamp(.5+.5*(b-a)/k,0.,1.); return mix(b,a,h)-k*h*(1.-h); }
    mat3 rotY(float a){ float c=cos(a),s=sin(a); return mat3(c,0,s, 0,1,0, -s,0,c); }
    mat3 rotX(float a){ float c=cos(a),s=sin(a); return mat3(1,0,0, 0,c,-s, 0,s,c); }

    float _scene(vec3 p){
      // 정팔면체
      vec3 po = rotX(uTime*0.18) * rotY(uTime*0.32) * p;
      float octa = _octa(po, 1.0) - 0.01;

      // 액체 느낌
      vec3 pb = rotX(-uTime*0.18) * rotY(-uTime*0.32) * p;
      float t    = uTime * 0.18;
      vec3  q    = pb * 2.5 + t;
      vec3  w    = q + 0.1*vec3(_vn(q), _vn(q+vec3(5.2,1.3,0.)), _vn(q+vec3(1.7,9.2,0.)));
      float blob = length(pb) - 0.72 - (_vn(w)-0.75)*0.25;
      return _smin(octa, blob, 0.1);
    }

    vec3 _normal(vec3 p){
      const float e=0.004;
      return normalize(vec3(
        _scene(p+vec3(e,0,0))-_scene(p-vec3(e,0,0)),
        _scene(p+vec3(0,e,0))-_scene(p-vec3(0,e,0)),
        _scene(p+vec3(0,0,e))-_scene(p-vec3(0,0,e))));
    }

    float _rm(vec3 ro, vec3 rd){
      float d=0.;
      for(int i=0;i<120;i++){
        float s=_scene(ro+rd*d);
        if(s<0.001||d>8.) break;
        d+=s*0.85;
      }
      return d;
    }

    // ── 광원(주 광원 + 반사광) ──
    vec3 envColor(vec3 dir){
      vec3 c=vec3(0.);
      c+=uLCol1*pow(max(dot(dir,normalize(uLPos1)),0.),48.)*5.0;
      c+=uLCol2*pow(max(dot(dir,normalize(uLPos2)),0.),28.)*3.5;
      c+=uLCol3*pow(max(dot(dir,normalize(uLPos3)),0.),52.)*5.0;
      c+=uLCol4*pow(max(dot(dir,normalize(uLPos4)),0.),22.)*2.5;
      c+=mix(vec3(0.01,0.01,0.03),vec3(0.04,0.05,0.09),dir.y*0.5+0.5)*0.5;
      return c;
    }

    float fresnel(vec3 V, vec3 N, float ior){
      float r0=pow((1.-ior)/(1.+ior),2.);
      return r0+(1.-r0)*pow(1.-clamp(dot(V,N),0.,1.),5.);
    }

    vec3 tonemapGamma(vec3 c){
      c=c/(c+1.);
      return pow(c,vec3(1./2.2));
    }

    void main(){
      vec3 ro = vCamObjPos;
      vec3 rd = normalize(vObjPos - vCamObjPos);

      float d   = _rm(ro, rd);
      bool  hit = d < 8.0;
      if(!hit){ discard; return; }

      // 오브젝트 공간 히트포인트 + 노말
      vec3 p    = ro + rd * d;
      vec3 objN = _normal(p);

      // 월드 공간으로 변환
      vec3 wPos = (uModelMat * vec4(p, 1.0)).xyz;
      vec3 N    = normalize(uNormalMat * objN);
      vec3 V    = normalize(uCamPos - wPos);
      float NdotV = clamp(dot(N, V), 0., 1.);

      vec3 albedo = vec3(0.88, 0.91, 0.95);

      // ── 메탈릭 환경 반사 ──
      vec3 refl  = envColor(reflect(-V, N)) * 2.2 * albedo;
      float fres = fresnel(V, N, 1.45);
      vec3  base = mix(albedo*0.015, refl, mix(0.75, 1.0, fres));

      // ── Blinn-Phong 스펙큘러 4광원 ──
      float sh = 320.0;
      vec3 H1=normalize(normalize(uLPos1-wPos)+V);
      vec3 H2=normalize(normalize(uLPos2-wPos)+V);
      vec3 H3=normalize(normalize(uLPos3-wPos)+V);
      vec3 H4=normalize(normalize(uLPos4-wPos)+V);
      vec3 spec = uLCol1*pow(max(dot(N,H1),0.),sh)
                + uLCol2*pow(max(dot(N,H2),0.),sh*0.55)
                + uLCol3*pow(max(dot(N,H3),0.),sh)
                + uLCol4*pow(max(dot(N,H4),0.),sh*0.38);

      // ── 프리즘 색분산: IOR 채널 분리 ──
      float iorR=1.37, iorG=1.46, iorB=1.66;
      vec3 L1d=normalize(uLPos1-wPos), L3d=normalize(uLPos3-wPos);
      vec3 prism=vec3(
        pow(max(dot(N,normalize(L1d*iorR+V)),0.),sh*1.15)+pow(max(dot(N,normalize(L3d*iorR+V)),0.),sh*1.15),
        pow(max(dot(N,normalize(L1d*iorG+V)),0.),sh*0.95)+pow(max(dot(N,normalize(L3d*iorG+V)),0.),sh*0.95),
        pow(max(dot(N,normalize(L1d*iorB+V)),0.),sh*0.78)+pow(max(dot(N,normalize(L3d*iorB+V)),0.),sh*0.78)
      )*4.0;

      // ── Thin-film 이리데슨스 (multiplicative) ──
      float filmVar = NdotV + (_vn((ro+rd*d)*4.5+uTime*0.18)-0.5)*0.35;
      vec3  thinFilm = 0.5+0.5*cos(filmVar*PI*1.8+vec3(0.,2.094,4.189));
      vec3  coloredRefl = refl * mix(vec3(1.0), thinFilm*1.6, 0.75);
      base = coloredRefl * mix(0.5, 1.0, fres);

      // ── 림 라이트 ──
      vec3 rim = pow(1.-NdotV, 3.2) * vec3(0.70, 0.90, 1.00) * 0.8;

      // ── 이리데슨스 엣지 ──
      float iridMask = pow(1.-NdotV, 3.8);
      vec3  irid = (0.5+0.5*cos((1.-NdotV)*PI*6.5+vec3(0.,2.094,4.189)))*iridMask*0.7;

      // Schlick Fresnel 반사율을 alpha로 사용
      float NdotV_a     = clamp(-dot(rd, objN), 0.0, 1.0);
      float r0          = pow((1.0 - 1.45) / (1.0 + 1.45), 2.0);
      float fresnelRefl = r0 + (1.0 - r0) * pow(1.0 - NdotV_a, 5.0);
      // uTransp=0: 불투명도
      float alpha       = mix(fresnelRefl, 1.0, uTransp);

      // premultiplied alpha:
      //   diffuse * alpha → 배경과 alpha 블렌딩
      //   specular        → alpha 무관 additive
      // blendFunc(ONE, ONE_MINUS_SRC_ALPHA) 에서:
      //   result = (diffuse*alpha + specular)*1 + dst*(1-alpha)
      vec3 diffCol = tonemapGamma(base + irid + rim);
      vec3 specCol = tonemapGamma(spec*2.0 + prism);

      gl_FragColor = vec4(diffCol * alpha + specCol, alpha);
    }
  `,
});

const mesh = new THREE.Mesh(new THREE.BoxGeometry(2.8,2.8,2.8), mat);
mesh.frustumCulled = false;
scene.add(mesh);

let t=0;
(function animate(){
  requestAnimationFrame(animate);
  t+=0.016;
  mesh.updateMatrixWorld();
  uMatWorldInv.value.copy(mesh.matrixWorld).invert();
  uModelMat.value.copy(mesh.matrixWorld);
  uNormalMat.value.getNormalMatrix(mesh.matrixWorld);
  uTime.value = t;
  renderer.render(scene, camera);
})();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
