<!DOCTYPE html>
<html>
<head>
<title>Prism3D</title>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #5866A5; }
  canvas { display: block; }

  /* prefers-reduced-motion fallback 이미지
     WebGL 대신 PrismQ-Photoroom.png를 전체화면으로 표시
     object-fit: contain → 비율 유지, 여백은 배경색(#5866A5) 채움 */
  #rm-fallback {
    display: none;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #5866A5;
  }
</style>
</head>
<body>

<!-- prefers-reduced-motion fallback: 아래 JS에서 조건부 display:block 처리 -->
<img id="rm-fallback" src="PrismQ-Photoroom.png" alt="" aria-hidden="true">

<script>
// ═══════════════════════════════════════════════════════
//  prefers-reduced-motion 감지
//  OS "동작 줄이기" 설정이 켜져 있으면:
//    → Three.js 렌더러 전체 생략
//    → PrismQ-Photoroom.png fallback 이미지 표시
//  접근성 근거: WCAG 2.1 §2.3.3 — 전정기관 장애 사용자 보호
// ═══════════════════════════════════════════════════════
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

if (prefersReducedMotion) {
  document.getElementById('rm-fallback').style.display = 'block';
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
if (!prefersReducedMotion) {
// ═══════════════════════════════════════════════════════
//  SCENE SETUP
// ═══════════════════════════════════════════════════════
// ── 디바이스 감지 & 렌더 품질 분기 ────────────────────────
//   모바일: DPR=1 (4× 픽셀 감소), AA 비활성, 30fps 캡
//   데스크탑: DPR=min(dpr, 1.5), AA 활성, 60fps
const isMobile     = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
const targetDPR    = isMobile ? 0.5 : Math.min(devicePixelRatio, 1.5);
const FPS_CAP      = isMobile ? 30 : 60;
const FPS_INTERVAL = 1000 / FPS_CAP;

const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: !isMobile }); // 모바일: AA 비활성 (fill rate 절감)
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(targetDPR);

const BG_COLOR = '#5866A5';
renderer.setClearColor(new THREE.Color(BG_COLOR), 1.0);
document.body.style.background = BG_COLOR;
document.body.appendChild(renderer.domElement);

// FPS 표시 오버레이 (정수, EMA 스무딩)
const fpsEl = document.createElement('div');
fpsEl.style.cssText = 'position:fixed;top:8px;right:12px;color:#fff;font:bold 12px monospace;'
  + 'text-shadow:0 1px 3px rgba(0,0,0,.6);pointer-events:none;z-index:9999;opacity:0.7;';
document.body.appendChild(fpsEl);

// ═══════════════════════════════════════════════════════
//  LIGHTING  —  4광원 구면좌표 배치
//  sph(r, polar, azimuth): 반경 r, 극각 θ, 방위각 φ
//  LR=13.0: 광원이 오브젝트에서 13 unit 떨어진 거리
//
//  [최적화] 4광원 → 3광원으로 축소 완료 (L4 블루 림 제거)
//    lCol[0]: 주광 페일 민트 — 유지
//    lCol[1]: 레드 보조광 (prism L2 입력)
//    lCol[2]: 그린 보조광 (prism 주요 입력 Ld3)
//    lCol[3]: 블루 림 — 제거 (GGX/env 전용, prism 미사용 → 기여 대비 비용 높음)
//  채도 추가 완화 시: lCol[1]=(0.85,0.45,0.40), lCol[2]=(0.40,0.75,0.50)
// ═══════════════════════════════════════════════════════
const PI = Math.PI;
function sph(r, t, p) {
  return new THREE.Vector3(
    r * Math.sin(t) * Math.cos(p),
    r * Math.cos(t),
    r * Math.sin(t) * Math.sin(p)
  );
}
const LR   = 13.0;
const lPos = [
  sph(LR, PI*0.22, PI*0.28),   // 상단 우측 앞
  sph(LR, PI*0.68, PI*1.25),   // 중간 좌측 뒤
  sph(LR, PI*0.50, PI*0.04),   // 중간 정면
  sph(LR, PI*0.88, PI*1.82),   // 하단 뒤
];
const lCol = [
  new THREE.Vector3(0.87, 0.95, 0.90),  // 페일 민트 (주광)
  new THREE.Vector3(0.50, 0.10, 0.05),  // 레드   ← 채도 강함, 완화 검토
  new THREE.Vector3(0.10, 0.50, 0.05),  // 그린   ← 채도 강함, 완화 검토
  new THREE.Vector3(0.10, 0.05, 1.00),  // 블루   ← 채도 강함, 완화 검토
];

// ═══════════════════════════════════════════════════════
//  DYNAMIC UNIFORMS  —  매 프레임 CPU→GPU 전달
// ═══════════════════════════════════════════════════════
const uTime        = { value: 0.0 };
const uMatWorldInv = { value: new THREE.Matrix4() };  // 오브젝트→카메라 공간 변환 역행렬
const uModelMat    = { value: new THREE.Matrix4() };  // 오브젝트→월드 공간 변환
const uNormalMat   = { value: new THREE.Matrix3() };  // 법선벡터 월드 공간 변환 (modelMatrix 역전치)

// ═══════════════════════════════════════════════════════
//  MATERIAL
// ═══════════════════════════════════════════════════════
const mat = new THREE.ShaderMaterial({
  transparent: true,
  // Premultiplied Alpha 블렌딩:
  //   diffuse는 alpha 가중치 적용, specular는 완전 가산(additive)
  //   출력: vec4(diffuse*alpha + specular, alpha)
  blending:    THREE.CustomBlending,
  blendSrc:    THREE.OneFactor,
  blendDst:    THREE.OneMinusSrcAlphaFactor,
  depthWrite:  false,
  side:        THREE.FrontSide,

  uniforms: {
    uTime:        uTime,
    uMatWorldInv: uMatWorldInv,
    uModelMat:    uModelMat,
    uNormalMat:   uNormalMat,
    uCamPos:      { value: camera.position },
    uResolution:  { value: new THREE.Vector2(
                      Math.round(innerWidth  * targetDPR),
                      Math.round(innerHeight * targetDPR)) }, // 실제 렌더 픽셀 해상도

    // 머티리얼 파라미터
    uTransp:   { value: 0.05 },  // 0=Fresnel 기반 투명 / 1=완전 불투명
    uRoughness:{ value: 0.65 },  // 0=거울 유리          / 1=서리 유리

    // blob displacement 억제 방향
    // 해당 방향과 평행한 위치(pole)에서 blob이 사라지고 정팔면체 면이 노출됨
    // 정팔면체 면 노멀 = normalize(±1, ±1, ±1) ≈ 0.577
    uPoleDir: { value: new THREE.Vector3(0.577, -0.577, -0.577) },

    // ── Displacement 영역 smoothstep 파라미터 ──────────────
    // uDispPoleEdge: poleMask smoothstep 전환 구간 (edge0, edge1)
    //   낮추면 → pole 근처까지 blob 확장 / 높이면 → pole에만 집중
    uDispPoleEdge: { value: new THREE.Vector2(0.35, 0.65) },
    // uDispGravEdge: gravBias smoothstep 입력 구간 (-y 기준)
    //   x: 하반구 시작점 / y: 상반구 종료점
    uDispGravEdge: { value: new THREE.Vector2(-0.2, 0.6) },
    // uDispGravBias: gravBias 가중치 (x=베이스, y=진폭)
    //   결과: x + y * smoothstep(...)  →  범위: x ~ (x+y)
    uDispGravBias: { value: new THREE.Vector2(0.7, 0.3) },

    // ── Emissive 영역 smoothstep 파라미터 ──────────────────
    // displacement와 독립적으로 자발광 영역을 별도 제어
    // uEmissPoleEdge: emissive poleMask 전환 구간
    //   displacement보다 넓게 설정 → 발광 영역이 displacement보다 크게
    uEmissPoleEdge: { value: new THREE.Vector2(0.00, 0.475) },
    // uEmissGravEdge: emissive gravBias smoothstep 입력 구간
    uEmissGravEdge: { value: new THREE.Vector2(-0.2, 0.6) },
    // uEmissGravBias: emissive gravBias 가중치 (x=베이스, y=진폭)
    uEmissGravBias: { value: new THREE.Vector2(0.7, 0.3) },

    // 무지개 파라미터 (레퍼런스 이미지 분석 기준)
    uIridExp:      { value: 3.5  },  // irid 분포 exponent: 낮을수록 면 전체로 퍼짐 (레퍼런스: 면 전체 무지개 띠)
    uIridStr:      { value: 1.2  },  // irid 강도 (레퍼런스: 옥타 면 moderate 무지개)
    uPrismStr:     { value: 10.0 },  // 스펙트럼 분산 배율 (레퍼런스: 면 안 날카로운 스펙트럼 선)
    uPrismDisp:    { value: 0.013},  // Cauchy 분산 계수 (레퍼런스: 파장 분리 뚜렷)
    uSemiEmissStr: { value: 0.7  },  // 블롭 자발광 강도 (레퍼런스: 블롭 강한 채도 자발광)

    uLPos1: { value: lPos[0] }, uLPos2: { value: lPos[1] },
    uLPos3: { value: lPos[2] }, uLPos4: { value: lPos[3] },
    uLCol1: { value: lCol[0] }, uLCol2: { value: lCol[1] },
    uLCol3: { value: lCol[2] }, uLCol4: { value: lCol[3] },
  },

  // ─────────────────────────────────────────────────────
  //  VERTEX SHADER
  //  오브젝트 공간 position과 카메라 위치를 fragment로 전달
  //  레이마칭은 fragment shader에서 오브젝트 공간 기준으로 수행
  // ─────────────────────────────────────────────────────
  vertexShader: `
    uniform mat4 uMatWorldInv;
    varying vec3 vObjPos;
    varying vec3 vCamObjPos;
    void main() {
      vObjPos    = position;
      vCamObjPos = (uMatWorldInv * vec4(cameraPosition, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,

  // ─────────────────────────────────────────────────────
  //  FRAGMENT SHADER
  // ─────────────────────────────────────────────────────
  fragmentShader: `
    #define PI 3.14159265359

    uniform float uTime;
    uniform mat4  uModelMat;
    uniform mat3  uNormalMat;
    uniform vec3  uCamPos;
    uniform vec2  uResolution; // 실제 렌더 해상도 (CSS pixel × DPR)
    uniform float uTransp;
    uniform float uRoughness;
    uniform vec3  uPoleDir;
    uniform float uIridExp;
    uniform float uIridStr;
    uniform float uPrismStr;
    uniform float uPrismDisp;
    uniform float uSemiEmissStr;
    uniform vec2  uDispPoleEdge;
    uniform vec2  uDispGravEdge;
    uniform vec2  uDispGravBias;
    uniform vec2  uEmissPoleEdge;
    uniform vec2  uEmissGravEdge;
    uniform vec2  uEmissGravBias;
    uniform vec3  uLPos1, uLPos2, uLPos3, uLPos4;
    uniform vec3  uLCol1, uLCol2, uLCol3, uLCol4;
    varying vec3  vObjPos;
    varying vec3  vCamObjPos;

    // ── [1] 3D Simplex Noise ───────────────────────────
    //  출력 범위 [0, 1]로 remapping
    vec3 _mod289v3(vec3 x){return x-floor(x*(1./289.))*289.;}
    vec4 _mod289v4(vec4 x){return x-floor(x*(1./289.))*289.;}
    vec4 _permute(vec4 x){return _mod289v4(((x*34.)+1.)*x);}
    vec4 _taylorInvSqrt(vec4 r){return 1.79284291400159-.85373472095314*r;}
    float _vn(vec3 v){
      const vec2 C=vec2(1./6.,1./3.);
      const vec4 D=vec4(0.,.5,1.,2.);
      vec3 i=floor(v+dot(v,C.yyy));
      vec3 x0=v-i+dot(i,C.xxx);
      vec3 g=step(x0.yzx,x0.xyz);
      vec3 l=1.-g;
      vec3 i1=min(g.xyz,l.zxy);
      vec3 i2=max(g.xyz,l.zxy);
      vec3 x1=x0-i1+C.xxx;
      vec3 x2=x0-i2+C.yyy;
      vec3 x3=x0-D.yyy;
      i=_mod289v3(i);
      vec4 p=_permute(_permute(_permute(
        i.z+vec4(0.,i1.z,i2.z,1.))
        +i.y+vec4(0.,i1.y,i2.y,1.))
        +i.x+vec4(0.,i1.x,i2.x,1.));
      float n_=.142857142857;
      vec3 ns=n_*D.wyz-D.xzx;
      vec4 j=p-49.*floor(p*ns.z*ns.z);
      vec4 x_=floor(j*ns.z);
      vec4 y_=floor(j-7.*x_);
      vec4 x=x_*ns.x+ns.yyyy;
      vec4 y=y_*ns.x+ns.yyyy;
      vec4 h=1.-abs(x)-abs(y);
      vec4 b0=vec4(x.xy,y.xy);
      vec4 b1=vec4(x.zw,y.zw);
      vec4 s0=floor(b0)*2.+1.;
      vec4 s1=floor(b1)*2.+1.;
      vec4 sh=-step(h,vec4(0.));
      vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
      vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
      vec3 p0=vec3(a0.xy,h.x);
      vec3 p1=vec3(a0.zw,h.y);
      vec3 p2=vec3(a1.xy,h.z);
      vec3 p3=vec3(a1.zw,h.w);
      vec4 norm=_taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
      p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
      vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
      m=m*m;
      return .5+.5*(42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3))));
    }

    // ── [2] SDF 프리미티브 ────────────────────────────
    //  Inigo Quilez 정확 정팔면체 SDF
    //  s: 꼭짓점까지의 거리 (외접구 반지름 ≈ s)
    float _octa(vec3 p, float s){
      p = abs(p);
      float m = p.x+p.y+p.z-s;
      vec3 q;
      if(3.0*p.x < m) q = p.xyz;
      else if(3.0*p.y < m) q = p.yzx;
      else if(3.0*p.z < m) q = p.zxy;
      else return m*0.57735027;
      float k = clamp(0.5*(q.z-q.y+s), 0.0, s);
      return length(vec3(q.x, q.y-s+k, q.z-k));
    }
    // C1 연속 Smooth Minimum: k=블렌딩 반경
    float _smin(float a, float b, float k){
      float h=clamp(.5+.5*(b-a)/k,0.,1.);
      return mix(b,a,h)-k*h*(1.-h);
    }
    mat3 rotY(float a){ float c=cos(a),s=sin(a); return mat3(c,0,s, 0,1,0, -s,0,c); }
    mat3 rotX(float a){ float c=cos(a),s=sin(a); return mat3(1,0,0, 0,c,-s, 0,s,c); }

    // ── [3] SDF 씬 컴포지션 ───────────────────────────
    // rot: 프레임당 1회 계산된 회전 행렬 (main()에서 전달) — 재계산 방지
    float _scene(vec3 p, mat3 rot){

      // 공통 회전 좌표 (octa·blob 동일 속도·방향 공회전)
      vec3  po       = rot * p;

      // 정팔면체 (s=1.0, bevel=0.01)
      // _octa 결과를 octaDist에 캐싱 → octa와 octaShell 모두 재사용
      float octaDist = _octa(po, 1.0);
      float octa     = octaDist - 0.01;

      // blob: 정팔면체 쉘(opOnion)을 기저로 Simplex noise displacement 적용
      //   q:  noise 입력 좌표, freq=1.5, 시간축으로 flow
      //   domain warp: 접선 방향(ang) 흐름으로 주름에 방향성 부여 (강도 0.22)
      //   octaShell: opOnion(octa, s=1.0, thickness=0.02) — 정팔면체 표면 근방 쉘
      //   displacement 진폭: ±0.2 (noise [0,1] → offset 기준 -0.75 적용)
      float flow  = uTime * 0.18;
      float ang   = atan(po.z, po.x);
      vec3  q     = po * 1.5 + flow;
      q.xz       += vec2(cos(ang + flow), sin(ang + flow)) * 0.22;
      vec3  w     = q + 0.1*vec3(_vn(q), _vn(q+vec3(5.2,1.3,0.)), _vn(q+vec3(1.7,9.2,0.)));

      // pole 마스크: uPoleDir 방향 꼭짓점 근처 displacement 억제
      //   dot→1 (pole 방향): mask=0 → blob 없음, 정팔면체 면 노출
      //   dot→0 (equator):   mask=1 → displacement 최대, 액체 주름
      //   전환 구간: smoothstep(0.35, 0.65)
      float poleY    = abs(dot(normalize(po), normalize(uPoleDir)));
      float poleMask = 1.0 - smoothstep(uDispPoleEdge.x, uDispPoleEdge.y, poleY);

      // 중력 바이어스: 하반구(po.y<0)에 blob 집중
      //   uDispGravBias.x + uDispGravBias.y * smoothstep(uDispGravEdge.x, uDispGravEdge.y, -y)
      float gravBias = uDispGravBias.x + uDispGravBias.y * smoothstep(uDispGravEdge.x, uDispGravEdge.y, -normalize(po).y);

      float octaShell = abs(octaDist) - 0.02;  // octaDist 재사용 (_octa 추가 호출 없음)
      float blob      = octaShell + (_vn(w) - 0.75) * 0.2 * poleMask * gravBias;

      // smooth union k=0.1: 두 표면 경계 10% 범위 내 C1 블렌딩
      return _smin(octa, blob, 0.1);
    }

    // ── [4] 수치 미분 법선 (6-tap central differences) ──
    //  epsilon=0.004: noise 파장(1/1.5≈0.67)보다 충분히 작아 안정적
    vec3 _normal(vec3 p, mat3 rot){
      const float e = 0.004;
      return normalize(vec3(
        _scene(p+vec3(e,0,0), rot) - _scene(p-vec3(e,0,0), rot),
        _scene(p+vec3(0,e,0), rot) - _scene(p-vec3(0,e,0), rot),
        _scene(p+vec3(0,0,e), rot) - _scene(p-vec3(0,0,e), rot)));
    }

    // ── [5] 레이마칭 ──────────────────────────────────
    //  sphere tracing: 80 스텝 (120→80, ~37% 감소), step multiplier=0.85
    //  miss 판정: d > 8.0 (bounding box 대각 ≈ 2.8*√3 ≈ 4.85 이상)
    float _rm(vec3 ro, vec3 rd, mat3 rot){
      float d = 0.;
      for(int i = 0; i < 80; i++){
        float s = _scene(ro + rd*d, rot);
        if(s < 0.001 || d > 8.) break;
        d += s * 0.85;
      }
      return d;
    }

    // ── [6] 절차적 환경 반사 ─────────────────────────
    //  3광원 방향으로 Phong lobe 합산 (L4 제거 — 25% specular 비용 절감)
    //  lobe exponent: roughness=0 → e=48~52 (날카로운 반사)
    //                 roughness=1 → e=3    (확산 반사)
    vec3 envColor(vec3 dir, float rough){
      float e1 = mix(48., 3., rough*rough);
      float e2 = mix(28., 3., rough*rough);
      float e3 = mix(52., 3., rough*rough);
      vec3 c = vec3(0.);
      c += uLCol1 * pow(max(dot(dir, normalize(uLPos1)), 0.), e1) * 5.0;
      c += uLCol2 * pow(max(dot(dir, normalize(uLPos2)), 0.), e2) * 3.5;
      c += uLCol3 * pow(max(dot(dir, normalize(uLPos3)), 0.), e3) * 5.0;
      // 앰비언트: 하늘(파랑 계열) ↔ 바닥(어두운 파랑) 그라디언트
      c += mix(vec3(0.01,0.01,0.03), vec3(0.04,0.05,0.09), dir.y*0.5+0.5) * 0.5;
      return c;
    }

    // ── [7] PBR 서브함수 ──────────────────────────────

    // GGX NDF: roughness^4 로 확장하여 하이라이트 형태 제어
    float D_GGX(float NdotH, float rough){
      float a2 = rough*rough*rough*rough;
      float d  = NdotH*NdotH*(a2-1.) + 1.;
      return a2 / (PI*d*d + 0.0001);
    }
    // Smith-Schlick 기하 감쇠: k=(roughness+1)²/8 (직접광 기준)
    float G_Smith(float NdotV2, float NdotL, float rough){
      float k  = (rough+1.)*(rough+1.) / 8.;
      float gv = NdotV2 / (NdotV2*(1.-k) + k);
      float gl = NdotL  / (NdotL *(1.-k) + k);
      return gv * gl;
    }
    // Dan Bruton 파장→RGB (380~700 nm 가시광 piecewise linear)
    vec3 wl2rgb(float w){
      vec3 c;
      if     (w < 440.) c = vec3(-(w-440.)/(440.-380.), 0., 1.);
      else if(w < 490.) c = vec3(0., (w-440.)/(490.-440.), 1.);
      else if(w < 510.) c = vec3(0., 1., -(w-510.)/(510.-490.));
      else if(w < 580.) c = vec3((w-510.)/(580.-510.), 1., 0.);
      else if(w < 645.) c = vec3(1., -(w-645.)/(645.-580.), 0.);
      else              c = vec3(1., 0., 0.);
      return clamp(c, 0., 1.);
    }
    // Schlick Fresnel: r0 = ((1-ior)/(1+ior))²
    float fresnel(vec3 V, vec3 N, float ior){
      float r0 = pow((1.-ior)/(1.+ior), 2.);
      return r0 + (1.-r0) * pow(1.-clamp(dot(V,N), 0., 1.), 5.);
    }
    // Reinhard 톤맵 + gamma 2.2
    vec3 tonemapGamma(vec3 c){
      c = c / (c + 1.);
      return pow(c, vec3(1./2.2));
    }

    // ── [8] 메인 셰이딩 ──────────────────────────────
    void main(){
      vec3 ro = vCamObjPos;
      vec3 rd = normalize(vObjPos - vCamObjPos);

      // 회전 행렬 1회 계산 — _scene() 호출(최대 86회)마다 재계산 방지
      // _rm(80스텝) + _normal(6-tap) = 86회 × (2×cos/sin + mat3 mul) 절감
      mat3 _rot = rotX(uTime*0.18) * rotY(-uTime*0.32);

      float d   = _rm(ro, rd, _rot);
      bool  hit = d < 8.0;
      if(!hit){ discard; return; }

      // 히트포인트 & 법선
      vec3 p    = ro + rd * d;
      vec3 objN = _normal(p, _rot);

      // 오브젝트 공간 → 월드 공간 변환
      vec3  wPos  = (uModelMat * vec4(p, 1.0)).xyz;
      vec3  N     = normalize(uNormalMat * objN);
      vec3  V     = normalize(uCamPos - wPos);
      float NdotV = clamp(dot(N, V), 0., 1.);

      vec3  albedo = vec3(0.88, 0.91, 0.95);        // 유리 베이스 색상 (청회색)
      float rough  = uRoughness;
      float F0     = pow((1.-1.45)/(1.+1.45), 2.);  // IOR=1.45 유리 기준 ≈ 0.035

      // ── [공통 마스크] octaFlatMask: 정팔면체 평면 vs blob 곡면 판별 ────────
      //
      //   정팔면체 면 법선 = normalize(±1,±1,±1) → L1-norm = |x|+|y|+|z| = √3 (최대)
      //   blob 곡면 법선  = 임의 방향           → L1-norm = 0.6~1.0 (분산됨)
      //   faceAlign: 정팔면체 면 ≈ 1.0, blob 곡면 ≈ 0.6
      //
      //   물리 근거: 평행 양면 유리(glass slab)는 두 번의 굴절이 서로 상쇄되어
      //   순 분산이 발생하지 않음 (이리데슨스·thinFilm·prism 모두 억제)
      //   반면 비평행 출사면(blob 곡면)은 분산 가시화 → prism 효과 유지
      float faceAlign    = (abs(objN.x) + abs(objN.y) + abs(objN.z)) / sqrt(3.0);
      float octaFlatMask = smoothstep(0.70, 0.95, faceAlign);
      // octaFlatMask ≈ 1.0: 정팔면체 평면 → 무채색 은빛 유리 (억제 최대)
      // octaFlatMask ≈ 0.0: blob 곡면    → 채도 효과 통과

      // 환경 반사 + thin-film 이리데슨스
      //   thinFilm: NdotV 기반 cos 3채널 → RGB 무지개 반사 변조
      //   mix 강도: 0.70 × (1-octaFlatMask) → 정팔면체 평면에서는 무채색 반사
      //   → 레퍼런스: 정팔면체 면 중앙 = 은빛/흰빛 유리, blob 곡면만 채도
      vec3  refl = envColor(reflect(-V, N), rough) * 2.2 * albedo;
      float fres = fresnel(V, N, 1.45);
      vec3  coloredRefl;
      {
        float filmVar      = NdotV;
        vec3  thinFilm     = 0.5 + 0.5*cos(filmVar*PI*2.5 + vec3(0., 2.094, 4.189));
        float filmStrength = 0.70 * (1.0 - octaFlatMask);
        coloredRefl        = refl * mix(vec3(1.0), thinFilm*1.6, filmStrength);
      }
      vec3 base = coloredRefl * mix(0.5, 1.0, fres);

      // GGX Cook-Torrance 스펙큘러 (4광원)
      vec3 spec = vec3(0.);
      vec3 lightDirs[4];
      vec3 lightCols[4];
      lightDirs[0]=normalize(uLPos1-wPos); lightCols[0]=uLCol1;
      lightDirs[1]=normalize(uLPos2-wPos); lightCols[1]=uLCol2;
      lightDirs[2]=normalize(uLPos3-wPos); lightCols[2]=uLCol3;
      lightDirs[3]=normalize(uLPos4-wPos); lightCols[3]=uLCol4;
      for(int i = 0; i < 3; i++){  // L4 제거 — 3광원
        vec3  L     = lightDirs[i];
        vec3  H     = normalize(L + V);
        float NdotL = max(dot(N, L), 0.);
        float NdotH = max(dot(N, H), 0.);
        float VdotH = max(dot(V, H), 0.);
        float D     = D_GGX(NdotH, rough);
        float G     = G_Smith(NdotV, NdotL, rough);
        vec3  F     = vec3(F0) + (1.-F0)*pow(1.-VdotH, 5.);
        spec       += lightCols[i] * (D*G*F / (4.*NdotV*NdotL + 0.001)) * NdotL * 2.5;
      }

      // 스펙트럼 분산 — Cauchy 방정식 + Dan Bruton 4파장 샘플 (8→4, ~50% 비용 절감)
      //   curveMask = (1-octaFlatMask): blob 곡면에서만 분산 가시화
      //   물리 근거: 비평행 출사면(blob 곡면)만 파장별 굴절각 차이 유지
      //             정팔면체 평행면은 분산이 내부에서 상쇄 → 무채색 스펙큘러만
      float curveMask = 1.0 - octaFlatMask;
      vec3 prism = vec3(0.);
      vec3 Ld1 = lightDirs[0], Ld3 = lightDirs[2];
      for(int i = 0; i < 4; i++){
        float wl  = mix(400., 700., float(i)/3.);
        float ior = 1.45 + uPrismDisp/(wl*wl*0.000001);
        float sh  = mix(800., 200., rough);
        float s1  = pow(max(dot(N, normalize(Ld1*ior + V)), 0.), sh);
        float s3  = pow(max(dot(N, normalize(Ld3*ior + V)), 0.), sh);
        prism    += wl2rgb(wl) * (s1 + s3);
      }
      prism /= 4.0;

      // 림 라이팅: 엣지에서 은빛 실루엣 강조 (pow 3.2 → 좁은 그라디언트)
      vec3 rim = pow(1.-NdotV, 3.2) * vec3(0.70, 0.90, 1.00) * 0.8;

      // 이리데슨스
      //   (1-octaFlatMask): 정팔면체 평면에서는 irid 제거 → 무채색 유리면
      //   blob 곡면(octaFlatMask≈0)에서만 무지개 글로우 유지
      float iridM = pow(1.-NdotV, uIridExp) * (1.0 - octaFlatMask);
      vec3  irid  = (0.5 + 0.5*cos((1.-NdotV)*PI*5.0 + vec3(0., 2.094, 4.189))) * iridM * uIridStr;

      // ── [앞면] Semi-emissive: blob 영역 자발광 ────────────────────────────
      //   semiMask = blobMask (NdotV 의존성 제거)
      //   물리 근거: 자발광 물체는 관측 각도와 무관하게 균일하게 방출
      //             정면(NdotV=1)에서도 억제 없이 강채도 유지 → 레퍼런스 blob 특성
      vec3  po_shade   = _rot * p;
      float poleY_s    = abs(dot(normalize(po_shade), normalize(uPoleDir)));
      float poleMask_s = 1.0 - smoothstep(uEmissPoleEdge.x, uEmissPoleEdge.y, poleY_s);
      float gravBias_s = uEmissGravBias.x + uEmissGravBias.y * smoothstep(uEmissGravEdge.x, uEmissGravEdge.y, -normalize(po_shade).y);
      float blobMask   = poleMask_s * gravBias_s;

      float longitude  = atan(po_shade.z, po_shade.x) / (2.0*PI) + 0.5;
      vec3  semiRainbow = wl2rgb(mix(380., 700., longitude));
      float semiMask    = blobMask;                              // NdotV 억제 제거
      vec3  semiEmiss   = semiRainbow * semiMask * uSemiEmissStr;

      // ── [2차 히트] 내부 고정 스텝 마칭 → 탈출점 + 두께 기반 투과 ────────
      //
      //   배경: SDF 내부(음수 영역)에서는 sphere tracing의 안전 거리가 보장되지 않음
      //         → 고정 스텝(0.035) 24회로 탈출점 탐색 (최대 0.84 단위, 48→24 ~50% 절감)
      //         Beer-Lambert는 근사값이므로 정밀도 손실 허용 범위
      //
      //   Beer-Lambert 투과율:
      //     transmission = exp(-thickness × absorb)
      //     absorb=0.55: 두께 1.0에서 약 53% 감쇠 (exp(-0.75) ≈ 0.47)
      //     → 정면(두꺼운 단면): 낮은 투과 → 뒤가 희미
      //     → 엣지(얇은 단면): 높은 투과 → blob 색 더 선명하게 투과
      //
      //   탈출점 p2에서 blob semiEmiss 재평가:
      //     p2_pert: roughness 기반 앞면 법선(반전) 방향 편차 → 흐릿한 투과 근사
      //     backN_approx = -objN: 앞면 법선 반전 (추가 _normal() 6-tap 생략)
      //     po2, blobMask2, lon2: 앞면과 동일한 공간 기준 → 표면 패턴 연속성 유지
      float d2 = d + 0.02;
      for(int i = 0; i < 24; i++){
        if(_scene(ro + rd * d2, _rot) > 0.001) break;
        d2 += 0.035;
      }
      float thickness    = d2 - d;
      float transmission = exp(-thickness * 0.75);  // Beer-Lambert: absorb=0.75

      vec3  backN_approx = -objN;
      vec3  p2_pert      = (ro + rd * d2) + backN_approx * rough * 0.12;
      vec3  po2          = _rot * p2_pert;
      float poleY2       = abs(dot(normalize(po2), normalize(uPoleDir)));
      float poleMask2    = 1.0 - smoothstep(uEmissPoleEdge.x, uEmissPoleEdge.y, poleY2);
      float gravBias2    = uEmissGravBias.x + uEmissGravBias.y * smoothstep(uEmissGravEdge.x, uEmissGravEdge.y, -normalize(po2).y);
      float blobMask2    = poleMask2 * gravBias2;
      float lon2         = atan(po2.z, po2.x) / (2.0*PI) + 0.5;
      vec3  backEmiss    = wl2rgb(mix(380., 700., lon2)) * blobMask2 * uSemiEmissStr;
      vec3  transmitted  = backEmiss * transmission;

      // Alpha — FresnelSchlickRoughness
      //   roughness=0: 순수 Fresnel (엣지 불투명, 중앙 투명)
      //   roughness=1: 균일 불투명 (서리 유리)
      //   uTransp:     전체 불투명도 오버라이드 (0~1)
      float NdotV_a  = clamp(-dot(rd, objN), 0., 1.);
      float maxFr    = max(1.-rough, F0);
      float fresnelR = F0 + (maxFr-F0) * pow(1.-NdotV_a, 5.);
      float alpha    = mix(mix(fresnelR, 1., rough), 1., uTransp);

      // 선형 공간에서 합산 후 단일 tonemapGamma 적용 (3회→1회, ~5% 절감)
      //   물리 근거: 톤매핑은 선형 합산 결과에 1회 적용이 물리적으로 올바름
      //   diffuse: alpha 가중치 적용 (유리 투명도)
      //   emiss:   alpha 독립 (자발광 → 관측각/투명도 무관)
      //   spec:    가산 혼합
      vec3 linearSum = (base + irid + rim) * alpha
                     + (spec + prism * uPrismStr * curveMask)
                     + (semiEmiss + transmitted);
      gl_FragColor  = vec4(tonemapGamma(linearSum), alpha);
    }
  `,
});

// ═══════════════════════════════════════════════════════
//  MESH  —  BoxGeometry가 레이마칭 bounding volume 역할
//  크기 2.8: 정팔면체(s=1.0) + blob 쉘이 완전히 포함되는 최소 박스
// ═══════════════════════════════════════════════════════
const mesh = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.8, 2.8), mat);
mesh.frustumCulled = false;
scene.add(mesh);

// ═══════════════════════════════════════════════════════
//  RENDER LOOP
//  - FPS 캡: 모바일 30fps / 데스크탑 60fps (열 관리 + 배터리)
//  - uTime: 실제 경과시간(초) 기반 → FPS 캡과 무관한 일정한 애니메이션 속도
//  - FPS 표시: EMA(α=0.1) 스무딩 후 Math.round() 정수 표시
// ═══════════════════════════════════════════════════════
let   lastFrameTime = 0;
let   smoothFps     = FPS_CAP;

(function animate(now = 0){
  requestAnimationFrame(animate);

  const delta = now - lastFrameTime;
  if(delta < FPS_INTERVAL - 0.5) return;  // FPS 캡 미만이면 스킵

  // EMA FPS 스무딩 (α=0.1 → 약 10프레임 평균)
  if(delta > 0) smoothFps = smoothFps * 0.9 + (1000 / delta) * 0.1;
  fpsEl.textContent = Math.round(smoothFps) + ' fps';

  lastFrameTime = now;

  uTime.value = now * 0.001;  // 실제 경과시간(초) — 애니메이션 속도 일관성 보장
  mesh.updateMatrixWorld();
  uMatWorldInv.value.copy(mesh.matrixWorld).invert();
  uModelMat.value.copy(mesh.matrixWorld);
  uNormalMat.value.getNormalMatrix(mesh.matrixWorld);
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  // uResolution 업데이트: 실제 렌더 픽셀 수 (CSS size × DPR)
  mat.uniforms.uResolution.value.set(
    Math.round(innerWidth  * targetDPR),
    Math.round(innerHeight * targetDPR)
  );
});
} // end: if (!prefersReducedMotion)
</script>
